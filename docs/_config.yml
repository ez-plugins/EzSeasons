remote_theme: just-the-docs/just-the-docs

title: EzSeasons
description: >-
  Standalone season scheduling plugin for Minecraft servers.
  Supports season resets, multi-language messages, and developer API integration.

url: "https://ez-plugins.github.io"
baseurl: "/EzSeasons"

# ── Appearance ────────────────────────────────────────────────────────────────
color_scheme: ezseasons
heading_anchors: true

# ── Header links ──────────────────────────────────────────────────────────────
aux_links:
  "GitHub":
    - "https://github.com/ez-plugins/EzSeasons"
  "JitPack":
    - "https://jitpack.io/#ez-plugins/EzSeasons"
aux_links_new_tab: true

# ── Navigation ────────────────────────────────────────────────────────────────
nav_sort: case_insensitive
nav_external_links:
  - title: Changelog
    url: "https://github.com/ez-plugins/EzSeasons/releases"
    hide_icon: false

# ── Search ────────────────────────────────────────────────────────────────────
search_enabled: true
search:
  heading_level:        2
  previews:             3
  preview_words_before: 5
  preview_words_after:  10
  tokenizer_separator: /[\s/]+/

# ── Footer ────────────────────────────────────────────────────────────────────
back_to_top:      true
back_to_top_text: "Back to top"

footer_content: >-
  Copyright &copy; 2024&ndash;2026 Gyvex.
  Distributed under the
  <a href="https://github.com/ez-plugins/EzSeasons/blob/main/LICENSE">MIT License</a>.

# ── Kramdown ──────────────────────────────────────────────────────────────────
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# ── Build exclusions ──────────────────────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - topics/
