name: Prevent build artifacts

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Ensure build artifacts are not tracked
        run: |
          if git ls-files | grep -E '(^|/)target/|\.class$|\.jar$'; then
            echo "Tracked build artifacts detected. Remove them from git index." >&2
            exit 1
          fi
