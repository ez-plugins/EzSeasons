name: Tests

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run unit tests
        # Workflow selectors assume tests follow the *UnitTest naming convention.
        run: mvn -B -Dtest='*UnitTest' test

  unit-test-coverage:
    name: Unit test coverage report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Generate unit test coverage report
        run: mvn -B -pl plugin -am -Dtest='*UnitTest' test org.jacoco:jacoco-maven-plugin:report
      - name: Add coverage summary to workflow report
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          csv_path = Path("plugin/target/site/jacoco/jacoco.csv")
          if not csv_path.exists():
              raise SystemExit("jacoco.csv was not produced")

          with csv_path.open("r", encoding="utf-8", newline="") as handle:
              reader = csv.DictReader(handle)
              rows = list(reader)

          instruction_missed = sum(int(row["INSTRUCTION_MISSED"]) for row in rows)
          instruction_covered = sum(int(row["INSTRUCTION_COVERED"]) for row in rows)
          branch_missed = sum(int(row["BRANCH_MISSED"]) for row in rows)
          branch_covered = sum(int(row["BRANCH_COVERED"]) for row in rows)
          line_missed = sum(int(row["LINE_MISSED"]) for row in rows)
          line_covered = sum(int(row["LINE_COVERED"]) for row in rows)

          def ratio(covered: int, missed: int) -> float:
              total = covered + missed
              return 100.0 if total == 0 else covered * 100.0 / total

          summary = [
              "## Unit Test Coverage",
              "",
              "| Metric | Covered | Missed | Coverage |",
              "| --- | ---: | ---: | ---: |",
              f"| Instructions | {instruction_covered} | {instruction_missed} | {ratio(instruction_covered, instruction_missed):.2f}% |",
              f"| Branches | {branch_covered} | {branch_missed} | {ratio(branch_covered, branch_missed):.2f}% |",
              f"| Lines | {line_covered} | {line_missed} | {ratio(line_covered, line_missed):.2f}% |",
          ]

          output_path = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          output_path.write_text("\n".join(summary) + "\n", encoding="utf-8")
          PY
      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v5
        with:
          name: unit-test-coverage-report
          path: plugin/target/site/jacoco
          if-no-files-found: error

  translation-tests:
    name: Translation coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Check translation coverage
        run: mvn -B -Dtest='TranslationCoverageUnitTest' test
  feature-tests:
    name: Feature tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run feature tests
        # Workflow selectors assume feature tests are named *FeatureUnitTest.
        run: mvn -B -Dtest='*FeatureUnitTest' test
