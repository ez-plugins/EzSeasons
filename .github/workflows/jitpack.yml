name: JitPack compatibility

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  jitpack-build:
    name: Simulate JitPack build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 25 (matches jitpack.yml jdk)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build API module (mirrors jitpack.yml install command)
        run: ./mvnw --batch-mode --no-transfer-progress clean install -pl api -am -Dmaven.test.skip=true
